<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>Blackwater Physiotherapy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..500&family=DM+Sans:opsz,wght@9..40,300..600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root{
    --bg: #f4f0e8;
    --bg-2: #ede7da;
    --ink: #1b1f1d;
    --ink-2: #383f3c;
    --ink-3: #6a716e;
    --rule: #d5cdbc;
    --rule-soft: #e3dccc;
    --accent: #1f5d63;          /* teal */
    --accent-ink: #f4f0e8;
    --serif: "Newsreader", "Times New Roman", serif;
    --sans: "DM Sans", "Helvetica Neue", system-ui, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  img{max-width:100%;display:block}
  .wrap{max-width:1320px;margin:0 auto;padding:0 56px}
  .eyebrow{font-family:var(--sans);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-3);font-weight:500}
  h1,h2,h3,h4{font-family:var(--serif);font-weight:380;letter-spacing:-0.015em;color:var(--ink);margin:0}
  h1{font-size:104px;line-height:.96}
  h2{font-size:64px;line-height:1.02}
  h3{font-size:32px;line-height:1.15}
  h4{font-size:22px;line-height:1.25}
  p{margin:0}
  .serif-i{font-style:italic;font-family:var(--serif)}
  hr.rule{border:0;border-top:1px solid var(--rule);margin:0}

  /* ---------- NAV ---------- */
  .nav{position:sticky;top:0;z-index:40;background:rgba(244,240,232,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--rule-soft)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:72px}
  .brand{display:flex;align-items:center;gap:10px;font-family:var(--serif);font-size:22px;letter-spacing:-.01em}
  .brand .mark{width:28px;height:28px;border-radius:50%;background:var(--ink);position:relative;display:inline-block}
  .brand .mark::after{content:"";position:absolute;inset:6px;border-radius:50%;border:1px solid var(--bg);}
  .nav ul{display:flex;gap:30px;list-style:none;padding:0;margin:0;font-size:14px;color:var(--ink-2)}
  .nav li a{position:relative;padding:6px 0}
  .nav li a:hover{color:var(--ink)}
  .nav li a.active{color:var(--ink)}
  .nav li a.active::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:1px;background:var(--ink)}
  .btn{display:inline-flex;align-items:center;gap:10px;height:46px;padding:0 22px;border-radius:999px;font-size:14px;font-weight:500;letter-spacing:.01em;border:1px solid transparent;cursor:pointer;transition:all .2s ease;background:transparent;color:inherit;font-family:var(--sans)}
  .btn-primary{background:var(--ink);color:var(--bg)}
  .btn-primary:hover{background:var(--accent);color:var(--accent-ink)}
  .btn-ghost{border-color:var(--ink);color:var(--ink)}
  .btn-ghost:hover{background:var(--ink);color:var(--bg)}
  .btn-accent{background:var(--accent);color:var(--accent-ink)}
  .btn-accent:hover{filter:brightness(.92)}
  .btn .arrow{display:inline-block;transition:transform .2s ease}
  .btn:hover .arrow{transform:translateX(3px)}

  /* ---------- HERO ---------- */
  .hero{padding:64px 0 24px;position:relative}
  .hero-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:48px;align-items:end}
  .hero h1{font-weight:340}
  .hero h1 .pill{display:inline-block;vertical-align:baseline}
  .rotator{display:inline-block;color:var(--accent);font-style:italic;font-weight:380;position:relative;min-width:1px}
  .rotator-track{display:inline-block;overflow:hidden;vertical-align:bottom;line-height:.96}
  .rotator-word{display:block;transform:translateY(0);transition:transform .55s cubic-bezier(.6,.02,.2,1),opacity .35s ease}
  .hero-meta{display:flex;flex-direction:column;gap:28px;padding-bottom:8px}
  .hero-body{font-size:18px;line-height:1.55;color:var(--ink-2);max-width:44ch}
  .hero-actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .hero-note{font-size:13px;color:var(--ink-3);display:flex;align-items:center;gap:10px}
  .hero-note .dot{width:6px;height:6px;border-radius:50%;background:#5a9d6a;box-shadow:0 0 0 4px rgba(90,157,106,.18)}

  .hero-media{margin-top:48px;display:grid;grid-template-columns:1.4fr 1fr;gap:18px}
  .hero-photo{position:relative;aspect-ratio:5/4;border-radius:6px;overflow:hidden;background:
    repeating-linear-gradient(135deg, #d8cfb8 0 14px, #cfc4ab 14px 28px);
    border:1px solid var(--rule)}
  .hero-photo .label{position:absolute;left:18px;bottom:18px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11px;color:#5a5240;background:rgba(244,240,232,.92);padding:6px 10px;border-radius:3px;letter-spacing:.04em}
  .hero-stack{display:flex;flex-direction:column;gap:18px}
  .hero-card{flex:1;border:1px solid var(--rule);border-radius:6px;padding:22px;background:var(--bg-2);display:flex;flex-direction:column;justify-content:space-between;min-height:170px}
  .hero-card .k{font-family:var(--serif);font-size:44px;line-height:1;letter-spacing:-.02em}
  .hero-card .lbl{font-size:12px;color:var(--ink-3);letter-spacing:.08em;text-transform:uppercase}
  .hero-card.dark{background:var(--ink);color:var(--bg);border-color:var(--ink)}
  .hero-card.dark .lbl{color:rgba(244,240,232,.6)}

  /* ---------- SECTION HEADERS ---------- */
  .sec{padding:120px 0;position:relative}
  .sec-head{display:grid;grid-template-columns:120px 1fr 1fr;gap:48px;padding-bottom:56px;align-items:end}
  .sec-num{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:var(--ink-3);letter-spacing:.1em}
  .sec-title{font-family:var(--serif);font-size:54px;line-height:1.03;letter-spacing:-.015em;max-width:14ch}
  .sec-blurb{color:var(--ink-2);font-size:16px;line-height:1.6;max-width:42ch;align-self:end}

  /* ---------- ABOUT ---------- */
  .about{padding:48px 0 0}
  .about-grid{display:grid;grid-template-columns:120px 1fr 1fr;gap:48px;border-top:1px solid var(--rule);padding-top:48px}
  .about-lead{font-family:var(--serif);font-size:34px;line-height:1.2;letter-spacing:-.01em;font-weight:340}
  .about-lead .em{color:var(--accent);font-style:italic}
  .about-body{color:var(--ink-2);font-size:16px;line-height:1.65;display:flex;flex-direction:column;gap:18px;max-width:42ch}

  /* ---------- MARQUEE / rotating words ---------- */
  .band{padding:56px 0;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);background:var(--bg-2);overflow:hidden}
  .band-inner{display:flex;align-items:center;gap:48px;white-space:nowrap;animation:marq 38s linear infinite}
  .band-word{font-family:var(--serif);font-size:80px;line-height:1;letter-spacing:-.02em;color:var(--ink)}
  .band-word.alt{color:transparent;-webkit-text-stroke:1px var(--ink);font-style:italic}
  .band-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);flex:0 0 auto}
  @keyframes marq{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  /* ---------- COMPARISON ---------- */
  .compare{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--rule);border-radius:6px;overflow:hidden;background:var(--bg-2)}
  .compare .col{padding:32px 36px}
  .compare .col + .col{border-left:1px solid var(--rule)}
  .compare .col.bw{background:var(--ink);color:var(--bg)}
  .compare .col h4{font-family:var(--sans);font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-weight:500;color:var(--ink-3)}
  .compare .col.bw h4{color:rgba(244,240,232,.6)}
  .compare ul{list-style:none;padding:0;margin:22px 0 0;display:flex;flex-direction:column}
  .compare li{padding:18px 0;border-top:1px solid var(--rule-soft);font-family:var(--serif);font-size:21px;line-height:1.3;letter-spacing:-.005em;font-weight:380;display:flex;gap:14px;align-items:flex-start}
  .compare .col.bw li{border-top-color:rgba(244,240,232,.14)}
  .compare li:first-child{border-top:0}
  .compare li .ico{flex:0 0 auto;width:18px;height:18px;border-radius:50%;display:grid;place-items:center;margin-top:4px;font-size:11px;font-family:var(--sans)}
  .compare .col.bw .ico{background:var(--accent);color:#fff}
  .compare .col.trad .ico{background:transparent;border:1px solid var(--ink-3);color:var(--ink-3)}

  /* ---------- SERVICES ---------- */
  .services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--rule);border:1px solid var(--rule);border-radius:6px;overflow:hidden}
  .service{background:var(--bg);padding:32px 28px 28px;display:flex;flex-direction:column;gap:20px;min-height:300px;transition:background .2s ease;cursor:pointer;position:relative}
  .service:hover{background:var(--bg-2)}
  .service .idx{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--ink-3);letter-spacing:.1em}
  .service h3{font-size:30px;line-height:1.08;letter-spacing:-.012em}
  .service p{color:var(--ink-2);font-size:14.5px;line-height:1.55;max-width:34ch}
  .service .more{margin-top:auto;font-size:13px;display:inline-flex;align-items:center;gap:8px;color:var(--ink);font-weight:500}
  .service .more .arrow{transition:transform .2s ease}
  .service:hover .more .arrow{transform:translateX(4px)}

  /* ---------- CONDITIONS ---------- */
  .cond-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px}
  .cond-group{border:1px solid var(--rule);border-radius:6px;padding:28px 30px;background:var(--bg-2);display:flex;flex-direction:column;gap:22px}
  .cond-group h4{font-family:var(--serif);font-size:24px;line-height:1.15;font-weight:380}
  .cond-tags{display:flex;flex-wrap:wrap;gap:8px}
  .cond-tag{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border:1px solid var(--rule);border-radius:999px;background:var(--bg);font-size:13.5px;color:var(--ink-2);transition:all .15s ease;cursor:pointer}
  .cond-tag:hover{border-color:var(--ink);color:var(--ink);background:var(--bg)}
  .cond-tag .dot{width:5px;height:5px;background:var(--accent);border-radius:50%}
  .cond-footer{margin-top:32px;display:flex;justify-content:space-between;align-items:center;color:var(--ink-2);font-size:14px}

  /* ---------- TEAM ---------- */
  .team-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:32px}
  .clinician{display:grid;grid-template-columns:.85fr 1.15fr;gap:24px;border:1px solid var(--rule);border-radius:6px;padding:22px;background:var(--bg-2)}
  .clin-photo{aspect-ratio:4/5;border-radius:4px;background:
    repeating-linear-gradient(135deg,#cfc4ab 0 14px,#c5b9a1 14px 28px);
    border:1px solid var(--rule);position:relative}
  .clin-photo .label{position:absolute;left:12px;bottom:12px;font-family:ui-monospace,Menlo,monospace;font-size:10px;color:#5a5240;background:rgba(244,240,232,.92);padding:5px 8px;border-radius:3px;letter-spacing:.04em}
  .clin-body{display:flex;flex-direction:column;gap:18px;padding:8px 6px 6px 0}
  .clin-body .role{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3)}
  .clin-body h3{font-family:var(--serif);font-size:46px;line-height:1;letter-spacing:-.02em;font-weight:340}
  .clin-body .teaser{color:var(--ink-2);font-size:14.5px;line-height:1.6;max-width:32ch}
  .clin-creds{margin-top:auto;display:flex;flex-direction:column;gap:6px;font-size:12.5px;color:var(--ink-3);letter-spacing:.02em;padding-top:14px;border-top:1px dashed var(--rule)}
  .clin-creds span b{color:var(--ink-2);font-weight:500;margin-right:6px}

  /* ---------- REVIEWS ---------- */
  .reviews{position:relative}
  .review-head{display:flex;justify-content:space-between;align-items:end;gap:24px;padding-bottom:32px}
  .review-rating{display:flex;align-items:baseline;gap:14px}
  .review-rating .num{font-family:var(--serif);font-size:64px;line-height:1;letter-spacing:-.02em;font-weight:340}
  .review-rating .stars{display:inline-flex;gap:2px;color:#c98a32;font-size:18px;letter-spacing:2px}
  .review-rating .meta{font-size:13px;color:var(--ink-3)}
  .review-track{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .review{background:var(--bg-2);border:1px solid var(--rule);border-radius:6px;padding:28px;display:flex;flex-direction:column;gap:18px;min-height:280px;transition:all .25s ease}
  .review.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}
  .review .quote{font-family:var(--serif);font-size:20px;line-height:1.35;letter-spacing:-.005em;font-weight:380;flex:1}
  .review .stars{color:#c98a32;letter-spacing:2px;font-size:14px}
  .review.active .stars{color:#e6b15a}
  .review .who{display:flex;justify-content:space-between;font-size:13px;color:var(--ink-3)}
  .review.active .who{color:rgba(244,240,232,.65)}
  .review .name{color:var(--ink);font-weight:500}
  .review.active .name{color:var(--bg)}
  .review-nav{display:flex;gap:10px;align-items:center}
  .review-nav button{width:44px;height:44px;border-radius:50%;border:1px solid var(--ink);background:transparent;display:grid;place-items:center;cursor:pointer;color:var(--ink);transition:all .2s ease}
  .review-nav button:hover{background:var(--ink);color:var(--bg)}

  /* ---------- INSURANCE ---------- */
  .insurance{display:flex;align-items:center;gap:48px;padding:36px 40px;border:1px solid var(--rule);border-radius:6px;background:var(--bg-2)}
  .insurance .lbl{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);flex:0 0 auto;max-width:160px;line-height:1.4}
  .insurance ul{list-style:none;padding:0;margin:0;display:flex;align-items:center;gap:56px;flex:1;justify-content:space-around}
  .insurance li{font-family:var(--serif);font-size:34px;letter-spacing:-.01em;color:var(--ink);font-style:italic;font-weight:340}

  /* ---------- FINAL CTA ---------- */
  .final{background:var(--ink);color:var(--bg);border-radius:8px;padding:96px 80px;display:grid;grid-template-columns:1.2fr .8fr;gap:64px;align-items:end;position:relative;overflow:hidden}
  .final::before{content:"";position:absolute;right:-200px;top:-200px;width:560px;height:560px;border-radius:50%;background:radial-gradient(closest-side,rgba(31,93,99,.55),transparent 70%)}
  .final h2{color:var(--bg);font-weight:340;font-size:84px;line-height:.98;letter-spacing:-.02em;max-width:14ch;position:relative}
  .final h2 .em{color:#7ac4cc;font-style:italic}
  .final-side{display:flex;flex-direction:column;gap:24px;position:relative}
  .final-side p{color:rgba(244,240,232,.72);font-size:16px;line-height:1.6;max-width:38ch}
  .final-actions{display:flex;gap:12px;flex-wrap:wrap}
  .btn-light{background:var(--bg);color:var(--ink)}
  .btn-light:hover{background:var(--accent);color:var(--bg)}
  .btn-outline-light{border:1px solid rgba(244,240,232,.4);color:var(--bg)}
  .btn-outline-light:hover{background:rgba(244,240,232,.1)}

  /* ---------- ACCREDITATION BAND ---------- */
  .accred{padding:36px 0;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule)}
  .accred-inner{display:flex;align-items:center;justify-content:space-between;gap:32px}
  .accred-inner .lbl{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-3)}
  .accred-inner ul{list-style:none;display:flex;gap:48px;margin:0;padding:0;font-size:14px;color:var(--ink-2)}
  .accred-inner li{display:flex;align-items:center;gap:10px}
  .accred-inner li::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent)}

  /* ---------- FOOTER ---------- */
  footer{padding:88px 0 56px;background:var(--bg)}
  .foot-grid{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:48px;padding-bottom:64px;border-top:1px solid var(--rule);padding-top:64px}
  .foot-grid h5{font-family:var(--sans);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-3);margin:0 0 18px;font-weight:500}
  .foot-grid ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:10px;font-size:14.5px;color:var(--ink-2)}
  .foot-grid ul a:hover{color:var(--ink)}
  .foot-brand{font-family:var(--serif);font-size:48px;line-height:1;letter-spacing:-.02em;font-weight:340;margin-bottom:24px}
  .foot-bottom{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-3);padding-top:24px;border-top:1px solid var(--rule)}

  /* small responsive niceties (1440 design) */
  @media (max-width:1100px){
    .wrap{padding:0 24px}
    h1{font-size:72px}
    .sec-head{grid-template-columns:1fr;gap:18px}
    .hero-grid,.about-grid{grid-template-columns:1fr;gap:24px}
    .services-grid{grid-template-columns:1fr}
    .cond-grid,.team-grid,.review-track,.final{grid-template-columns:1fr}
    .compare{grid-template-columns:1fr}
    .compare .col + .col{border-left:0;border-top:1px solid var(--rule)}
    .final{padding:48px 28px}
    .foot-grid{grid-template-columns:1fr 1fr}
  }
</style>
<script>window.SEO={title:'Blackwater Physiotherapy',description:'',path:'Blackwater Physiotherapy v1 - Editorial.html',type:'page',crumb:'Blackwater Physiotherapy',image:'assets/about-hero-2.webp'};</script>
<script src="seo.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="home-v1.jsx"></script>

</body>
</html>
