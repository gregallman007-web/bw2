<style>
  .legal-hero{background:var(--ink);color:#fff;position:relative;overflow:hidden}
  .legal-hero::after{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 50% 70% at 85% 20%, rgba(47,174,170,.28), transparent 60%);pointer-events:none}
  .legal-hero .wrap{position:relative;padding-top:128px;padding-bottom:56px}
  .crumb{display:flex;align-items:center;gap:10px;font-family:var(--manrope);font-size:12px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;color:rgba(255,255,255,.55);margin-bottom:22px;flex-wrap:wrap}
  .crumb a{color:rgba(255,255,255,.55)}.crumb a:hover{color:#fff}.crumb span[aria-current]{color:var(--teal)}
  .page-eyebrow{display:inline-flex;align-items:center;gap:12px;font-family:var(--manrope);font-size:12px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;color:#a8e4e1;margin-bottom:18px}
  .page-eyebrow .bar{width:32px;height:2px;background:var(--teal)}
  .legal-hero h1{font-family:var(--teko);text-transform:uppercase;color:#fff;font-size:clamp(44px,7vw,84px);line-height:.95;letter-spacing:.01em;font-weight:600;margin:0}
  .legal-updated{font-family:var(--manrope);font-size:13px;color:rgba(255,255,255,.6);font-weight:500;margin:16px 0 0}

  .legal-wrap{max-width:820px;margin:0 auto}
  .legal-intro{font-family:var(--body);font-size:clamp(17px,2vw,20px);line-height:1.65;color:var(--ink);font-weight:400;margin:0 0 40px;padding-bottom:32px;border-bottom:1px solid var(--line)}
  .legal-sections{display:flex;flex-direction:column;gap:32px}
  .legal-block h2{font-family:var(--teko);text-transform:uppercase;font-size:clamp(22px,2.6vw,28px);letter-spacing:.02em;color:var(--ink);font-weight:600;margin:0 0 10px;line-height:1.05}
  .legal-block p{font-family:var(--body);font-size:16px;line-height:1.7;color:#3a444a;margin:0}
  .legal-note{margin-top:40px;padding:22px 24px;background:linear-gradient(165deg,#eef5f4,#f7fafa);border:1px solid var(--line);border-left:4px solid var(--teal);border-radius:12px}
  .legal-note p{margin:0;font-family:var(--body);font-size:15.5px;line-height:1.6;color:var(--ink)}
  .legal-note a{color:var(--teal-deep);font-weight:600;text-decoration:underline;text-underline-offset:2px}

  @media (max-width:600px){.legal-hero .wrap{padding-top:104px}}
</style>
