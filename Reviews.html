<script>window.SEO={title:'FAQs — Blackwater Physiotherapy, Maldon',description:'Frequently asked questions about physiotherapy at Blackwater Physiotherapy in Maldon, Essex — booking, your first appointment, treatment, insurance and home visits.',path:'FAQs.html',type:'page',crumb:'FAQs',image:'assets/faq-hero.webp',faqs:[["Do I need a GP referral to be seen?","No — you can book directly with us as a self-referral. If you're claiming through private health insurance, check whether your policy requires a GP referral first, as some do."],["How do I book an appointment?","Book online in under two minutes using the booking button, or call us on 07790 717056. We'll always confirm your appointment and answer any questions before your first visit."],["How quickly can I be seen?","We usually have same-week appointments available, and often sooner. If you're in significant pain, let us know and we'll do our best to fit you in quickly."],["Where are you based and is there parking?","We're at The Old Ironworks in Maldon, Essex, with free on-site parking and easy access — a short distance from Maldon High Street."],["What happens at the first appointment?","Your Initial Assessment is a thorough one-to-one session. We'll discuss your symptoms, history and goals, carry out a physical and movement assessment, explain what's going on, and start treatment with a clear plan for what comes next."],["What should I wear?","Comfortable clothing you can move in. We may need to see the area we're treating, so loose layers (or shorts/a vest top) are helpful."],["How long are appointments?","Initial Assessments are around 45 minutes; follow-up sessions are 30 minutes and rehabilitation sessions are typically focused, longer sessions lasting 30–60 minutes."],["How many sessions will I need?","Our goal is to help you recover as efficiently as possible, not to keep you coming back unnecessarily. We'll recommend follow-up appointments only when they add value and support your progress."],["How much does it cost?","Initial Assessment £60, Follow-Up £50, Rehabilitation £40 (30 min) / £60 (60 min), Acupuncture £40, Sports Massage £40 (30 min) / £60 (60 min), and Home Visits £70 (30 min) / £80 (45 min). We'll always be clear about cost before you book."],["Do you accept private health insurance?","Yes — we work with Bupa, AXA, Aviva, WPA, HCML and Proclaim Group, among others. Please bring your policy and authorisation details, and check any referral requirements with your insurer."],["Do you offer home visits?","Yes. Home visits bring assessment-led physiotherapy to your own home — ideal after surgery or when getting to the clinic is difficult. See our Home Visits service for details."],["What conditions do you treat?","We treat a wide range of musculoskeletal problems — back and neck pain, sciatica, joint and sports injuries, post-operative rehab and persistent pain. If you're unsure, get in touch and we'll advise."],["What if my problem needs more than physiotherapy?","Sometimes the right next step is medical input. We can refer you back to your GP with a clinic letter to support ongoing treatment or further investigations, and we work closely with a strong network of orthopaedic, paediatric and sport & exercise medicine consultants we can refer to and liaise with on your behalf."],["What if I need to cancel or reschedule?","No problem — just let us know as far in advance as you can so we can offer the slot to someone else. We'll explain our cancellation policy when you book."]]};</script>
